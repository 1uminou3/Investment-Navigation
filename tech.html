<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票技術指標大圖鑑</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <!-- 核心修正：將文字與圖標用 span 分開包裝 -->
        <h1>
            <span class="gradient-text">股票技術指標大圖鑑</span>
            <span class="header-icon">📈</span>
        </h1>
        <p>點擊下方指標卡片，查看詳細的專業定義與童話比喻。</p>
        <div>
            <a href="index.html" class="back-link">← 返回基本看盤指標頁面</a>
        </div>
    </header>

    <main id="indicators-container">
        <!-- JS 會自動將卡片生成在此處 -->
    </main>

    <!-- 彈出視窗 (Modal) —— 完美修正標籤錯位的乾淨結構 -->
    <div id="infoModal" class="modal">
        <div class="modal-content">
            
            <span id="closeBtn" class="close-btn">&times;</span>
            
            <h2 id="modalTitle" class="modal-title"></h2>
            
            <div>
                <span id="modalCategory" class="modal-badge"></span>
            </div>
            
            <!-- 區塊一：官方意思 -->
            <div class="detail-block">
                <h4>📖 官方意思</h4>
                <p id="modalOfficial"></p>
            </div>
            
            <!-- 區塊二：生活比喻 -->
            <div id="blockMetaphor" class="detail-block">
                <h4>💡 生活比喻</h4>
                <p id="modalMetaphor"></p>
            </div>
            
            <!-- 區塊三：數值背後含義 -->
            <div class="detail-block">
                <h4>📈 數值背後含義</h4>
                <div id="modalHighLow"></div>
            </div>
            
        </div>
    </div>

    <script src="tech.js"></script>
</body>
</html>
