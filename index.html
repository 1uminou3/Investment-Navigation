<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投資導航 - 股票指標輕鬆學</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-content">
            <!-- 核心修正：將文字與圖標用 span 分開包裝 -->
            <h1>
                <span class="gradient-text">Hiu Wing投資導航</span>
                <span class="header-icon">🧭</span>
            </h1>
            <p>將複雜的股市術語，翻譯成你能秒懂的生活常識</p>
            <div style="margin-top: 15px;">
                <a href="tech.html" class="back-link" style="color: #1e62c4;">👉 切換至：技術線圖指標大圖鑑</a>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- 指標卡片將會透過 JavaScript 動態生成在這裡 -->
        <div id="indicators-container"></div>
    </main>

    <!-- 彈出視窗 (Modal) —— 結構完全同步 tech.html 的高質感排版 -->
    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeBtn">&times;</span>
            <h2 class="modal-header" id="modalTitle">指標名稱</h2>
            <div>
                <span class="modal-badge" id="modalCategory">分類</span>
            </div>
            
            <div class="detail-block" id="blockOfficial">
                <h4>📖 官方意思</h4>
                <p id="modalOfficial"></p>
            </div>
            
            <div class="detail-block" id="blockMetaphor">
                <h4>💡 生活比喻</h4>
                <p id="modalMetaphor"></p>
            </div>
            
            <div class="detail-block" id="blockHighLow">
                <h4>📈 數值背後含義</h4>
                <div id="modalHighLow"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
